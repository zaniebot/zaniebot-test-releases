name: Release Lab

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag / release name to use.
        required: true
        type: string
      sha:
        description: Optional target SHA. Defaults to github.sha.
        required: false
        type: string
      manual-deploy:
        description: Create a successful manual deployment for the target SHA before creating the release.
        required: false
        default: false
        type: boolean
      notes:
        description: Release notes.
        required: false
        default: playground release
        type: string

permissions: {}

jobs:
  create-release-deployment:
    name: Create release deployment
    if: ${{ inputs.manual-deploy }}
    runs-on: ubuntu-latest
    environment: release-gate
    permissions:
      deployments: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INPUT_SHA: ${{ inputs.sha }}
    steps:
      - name: Resolve target SHA
        id: vars
        run: |
          set -euo pipefail
          target_sha="$INPUT_SHA"
          if [ -z "$target_sha" ]; then
            target_sha="$GITHUB_SHA"
          fi
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Create manual deployment for target SHA
        env:
          TARGET_SHA: ${{ steps.vars.outputs.target_sha }}
        run: |
          set -euo pipefail

          payload=$(jq -nc \
            --arg ref "$TARGET_SHA" \
            '{
              ref: $ref,
              environment: "release",
              auto_merge: false,
              required_contexts: [],
              description: "Release Lab manual deployment"
            }')

          deployment_id=$(printf '%s' "$payload" | gh api "repos/${GITHUB_REPOSITORY}/deployments" --method POST --input - --jq '.id')

          gh api "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" \
            --method POST \
            -f state=success \
            -F auto_inactive=false >/dev/null

  release:
    name: Release
    needs:
      - create-release-deployment
    if: ${{ always() && (!inputs.manual-deploy || needs.create-release-deployment.result == 'success' || needs.create-release-deployment.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      deployments: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve inputs
        id: vars
        env:
          INPUT_SHA: ${{ inputs.sha }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_NOTES: ${{ inputs.notes }}
          INPUT_MANUAL_DEPLOY: ${{ inputs.manual-deploy }}
        run: |
          set -euo pipefail

          target_sha="$INPUT_SHA"
          if [ -z "$target_sha" ]; then
            target_sha="$GITHUB_SHA"
          fi

          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          printf 'notes<<__EOF__\n%s\n__EOF__\n' "$INPUT_NOTES" >> "$GITHUB_OUTPUT"

          {
            echo "## Release Lab"
            echo
            echo "- manual deploy: $INPUT_MANUAL_DEPLOY"
            echo "- tag: $INPUT_TAG"
            echo "- target sha: $target_sha"
            echo "- workflow sha: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Show deployments for target SHA before release
        env:
          TARGET_SHA: ${{ steps.vars.outputs.target_sha }}
        run: |
          set -euxo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=release&sha=${TARGET_SHA}&per_page=20" \
            --jq '.[] | {id, environment, sha, created_at, updated_at}' || true

      - name: Create release
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          TARGET_SHA: ${{ steps.vars.outputs.target_sha }}
          NOTES: ${{ steps.vars.outputs.notes }}
        run: |
          set -euxo pipefail
          gh release create "$TAG" --target "$TARGET_SHA" --title "$TAG" --notes "$NOTES"

      - name: Show final state
        if: ${{ always() }}
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          TARGET_SHA: ${{ steps.vars.outputs.target_sha }}
        run: |
          set +e
          echo "Release:"
          gh release view "$TAG" --json tagName,isDraft,targetCommitish,url,publishedAt,createdAt 2>/dev/null || true
          echo
          echo "Deployments for target SHA:"
          gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=release&sha=${TARGET_SHA}&per_page=20" \
            --jq '.[] | {id, environment, sha, created_at, updated_at}' || true
